<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Entrega Avulsa</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #f8f9fa; }
        .card { border: none; border-radius: 12px; }
        .form-label { font-weight: 600; color: #495057; }
        .readonly-custom { background-color: #e9ecef; border-style: dashed; }
        .btn-primary { border-radius: 8px; padding: 12px; font-weight: bold; }
    </style>
</head>

{% include "cabecalho.html" %}

{% block content %}
<body>

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
            
            <div class="text-center mb-4">
                <h2 class="fw-bold text-dark">Nova Entrega Avulsa</h2>
                <p class="text-muted">Preencha os dados abaixo para gerar o registro</p>
            </div>

            <div class="card shadow-sm">
                <div class="card-body p-4">
                    
                    {% if erro %}
                        <div class="alert alert-danger d-flex align-items-center" role="alert">
                            <i class="fas fa-exclamation-circle me-2"></i>
                            <div>{{ erro }}</div>
                        </div>
                    {% endif %}

                    <form method="post">
                        {% csrf_token %}

                        <div class="mb-3">
                            <label for="cd_fun_entr" class="form-label">
                                <i class="fas fa-user-tie me-1 text-primary"></i> Funcionário Responsável
                            </label>
                            <select name="cd_fun_entr" id="cd_fun_entr" class="form-select form-select-lg" required>
                                <option value="">-- Selecione o entregador --</option>
                                {% for f in funcionarios %}
                                    <option value="{{ f.cd_usu }}"> {{ f.cd_usu }} - {{ f.user.get_full_name }}</option>
                                {% endfor %}
                            </select>
                        </div>

                        <div class="mb-4">
                            <label for="customer_id" class="form-label">
                                <i class="fas fa-user-tag me-1 text-primary"></i> Cliente
                            </label>
                            <select name="customer_id" id="customer_id" class="form-select form-select-lg" required>
                                <option value="">-- Selecione um cliente --</option>
                                {% for cliente in customers %}
                                    <option value="{{ cliente.id }}">{{ cliente.name }} ({{ cliente.code }})</option>
                                {% endfor %}
                            </select>
                            
                            <div class="mt-2 text-end">
                                <a href="/cliente/novo/" target="_blank" class="text-decoration-none small fw-bold">
                                    <i class="fas fa-plus-circle"></i> Cadastrar novo cliente
                                </a>
                            </div>
                        </div>

                        <hr class="my-4 text-muted">

                        <div class="row">
                            <div class="col-6 mb-3">
                                <label class="form-label small text-uppercase">Cód. Entrega</label>
                                <input type="text" value="{{ proximo_cd_entr }}" class="form-control readonly-custom text-center fw-bold" readonly>
                            </div>
                            <div class="col-6 mb-3">
                                <label class="form-label small text-uppercase">Cód. Venda</label>
                                <input type="text" value="{{ proximo_cd_vd }}" class="form-control readonly-custom text-center fw-bold" readonly>
                            </div>
                        </div>

                        <div class="d-grid gap-2 mt-3">
                            <button type="submit" class="btn btn-primary btn-lg shadow-sm">
                                <i class="fas fa-truck-ramp-box me-2"></i>Criar Entrega
                            </button>
                            <a href="/home_administrativo/" class="btn btn-light">Cancelar</a>
                        </div>

                    </form>
                </div>
            </div>

            <p class="text-center mt-4 text-muted small">
                © 2026 Sistema de Entregas - <strong>Ray Farias</strong>
            </p>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
{% endblock content %}
</html>
