<!DOCTYPE html>
{% include "cabecalho.html" %}
{% block content %}

<style>
    body {
        background-color: #f0f2f5;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    .registration-container {
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 40px 15px;
    }

    .box {
        width: 100%;
        max-width: 450px;
        background: #ffffff;
        padding: 40px;
        border-radius: 12px;
        box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        text-align: left; /* Alinhamento para labels */
    }

    .box h1 {
        color: #333;
        font-size: 28px;
        font-weight: 700;
        margin-bottom: 30px;
        text-align: center;
    }

    /* Estilização dos campos */
    .form-group {
        margin-bottom: 18px;
    }

    .box label {
        display: block;
        font-size: 14px;
        color: #555;
        margin-bottom: 6px;
        font-weight: 600;
    }

    .box input[type="text"],
    .box input[type="password"],
    .box input[type="email"],
    .box select {
        width: 100%;
        padding: 12px 15px;
        border: 1px solid #ddd;
        border-radius: 8px;
        font-size: 15px;
        transition: all 0.3s;
        box-sizing: border-box; /* Garante que o padding não quebre a largura */
    }

    .box input:focus, .box select:focus {
        border-color: #3498db;
        outline: none;
        box-shadow: 0 0 0 3px rgba(52, 152, 219, 0.2);
    }

    /* Grupo de Botões */
    .button-group {
        margin-top: 30px;
        display: flex;
        flex-direction: column;
        gap: 12px;
    }

    .btn-submit {
        background-color: #2ecc71;
        color: white;
        border: none;
        padding: 14px;
        border-radius: 8px;
        font-size: 16px;
        font-weight: bold;
        cursor: pointer;
        transition: background 0.3s;
    }

    .btn-submit:hover {
        background-color: #27ae60;
    }

    .btn-login-link {
        text-align: center;
        color: #3498db;
        text-decoration: none;
        font-size: 14px;
    }

    .btn-login-link:hover {
        text-decoration: underline;
    }

    /* Erros */
    .alert-danger {
        background-color: #fee2e2;
        color: #dc2626;
        padding: 10px;
        border-radius: 6px;
        font-size: 14px;
        margin-bottom: 20px;
        border: 1px solid #fecaca;
    }

    /* Responsividade */
    @media (max-width: 480px) {
        .box { padding: 25px 20px; }
    }
</style>

<div class="registration-container">
    <div class="box">
        <form method="post" enctype="multipart/form-data">
            {% csrf_token %}
            <h1>Novo Cadastro</h1>

            {% if error %}
            <div class="alert-danger text-center">
                <i class="fa fa-exclamation-circle"></i> {{ error }}
            </div>
            {% endif %}

            <div class="form-group">
                <label for="username">Usuário (Login)</label>
                <input type="text" name="username" id="username" required placeholder="Ex: joao.silva">
            </div>

            <div class="row" style="margin: 0 -5px;">
                <div class="col-xs-6" style="padding: 0 5px;">
                    <div class="form-group">
                        <label for="first_name">Nome</label>
                        <input type="text" name="first_name" id="first_name" required>
                    </div>
                </div>
                <div class="col-xs-6" style="padding: 0 5px;">
                    <div class="form-group">
                        <label for="last_name">Sobrenome</label>
                        <input type="text" name="last_name" id="last_name" required>
                    </div>
                </div>
            </div>

            <div class="form-group">
                <label for="email">Email Profissional</label>
                <input type="email" name="email" id="email" required placeholder="email@empresa.com">
            </div>

            <div class="form-group">
                <label for="password">Senha</label>
                <input type="password" name="password" id="password" required placeholder="********">
            </div>

            <div class="form-group">
                <label for="cd_usu">Código do Funcionário</label>
                <input type="text" name="cd_usu" id="cd_usu" required placeholder="ID Interno">
            </div>

            <div class="form-group">
                <label for="funcao">Função / Cargo</label>
                <select name="funcao" id="funcao" required>
                    <option value="" disabled selected>Selecione uma opção</option>
                    <option value="ENTREGADOR">Entregador</option>
                    <option value="ADMINISTRATIVO">Administrativo</option>
                    <option value="GERENTE">Gerente</option>
                    <option value="S. GERENTE">S. Gerente</option>
                    <option value="OP. DE CAIXA">Operador de Caixa</option>
                </select>
            </div>

            <div class="button-group">
                <button type="submit" class="btn-submit">Criar minha conta</button>
                <!-- <a href="{% url 'login' %}" class="btn-login-link">Já tem uma conta? Faça login</a> -->
            </div>
        </form>
    </div>
</div>

{% include "footer.html" %}
{% endblock content %}
