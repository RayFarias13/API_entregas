<!doctype html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <title>Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        html, body {
            height: 100%;
        }

        body {
        display: flex;
        flex-direction: column; /* importante para footer fixar embaixo */
        justify-content: center; /* centraliza verticalmente o card */
        align-items: center;
        min-height: 90vh; /* garante altura total da tela */
        background-color: #f8f9fa;
}

        .login-card {
            width: 100%;
            max-width: 600px;
            min-width: 400px;
        }

        .card-header {
            background-color: #343a40;
            color: white;
            text-align: center;
        }

        /* Campos de input e botão crescem proporcionalmente ao card usando clamp */
        .login-card input,
        .login-card button {
            font-size: clamp(2rem, 4vw, 1.5rem); /* mínimo 1rem, proporcional 4vw, máximo 1.5rem */
            padding: 0.5em;
        }
        /* Footer fluido */
        footer {
            background-color: #343a40;
            color: white;
            width: 100%;
            text-align: center;
            padding: clamp(0.5rem, 2vw, 1.5rem); /* altura do footer proporcional */
            font-size: clamp(0.8rem, 2vw, 1.2rem); /* fonte proporcional */
            flex-shrink: 0; /* não encolhe */
        }
    </style>
</head>
<body>
            <!-- seu login -->

    <div class="login-card card shadow">
        <div class="card-header">
            <h4>Login</h4>
        </div>

        <div class="card-body">
            {% if form.errors %}
                <div class="alert alert-danger">
                    Usuário ou senha incorretos.
                </div>
            {% endif %}

            <form method="POST">
                {% csrf_token %}

                <div class="mb-3">
                    <label for="username" class="form-label">Usuário</label>
                    <input type="text" name="username" class="form-control" required>
                </div>

                <div class="mb-3">
                    <label for="password" class="form-label">Senha</label>
                    <input type="password" name="password" class="form-control" required>
                </div>

                <button type="submit" class="btn btn-success w-100">Entrar</button>
            </form>
        </div>
    </div>
<footer class="bg-dark text-white text-center py-3 mt-auto w-100">
    
        <div class="container">
            <small>&copy; 2026 Sistema de Entregas - DC.</small>
            <small> Todos os direitos reservados. Caso de dúvida, entre em contato com o administrador.</small>
        </div>
    </footer>
</body>

</html>
