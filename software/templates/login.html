{% load static %}
<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>

:root{
    --bg1:#0f172a;
    --bg2:#111827;

    --primary:#00d4ff;
    --secondary:#7c3aed;

    --glass:rgba(255,255,255,.07);
    --border:rgba(255,255,255,.12);

    --text:#ffffff;
    --muted:#94a3b8;

    --danger:#ef4444;
    --success:#22c55e;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}
body {
    font-family: 'Inter', sans-serif;

    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;

    overflow-x: hidden;
    overflow-y: auto;

    padding: 30px;

    position: relative;

    background: linear-gradient(
        270deg,
        #38bdf8,
        #60a5fa,
        #a78bfa,
        #22d3ee,
        #0ea5e9
    );

    background-size: 400% 400%;
    animation: bgAnimation 10s ease infinite;
}
@keyframes bgAnimation {
    0% {
        background-position: 0% 50%;
    }
    50% {
        background-position: 100% 50%;
    }
    100% {
        background-position: 0% 50%;
    }
}
/* BACKGROUND */

body::before{
    content:'';

    position:absolute;

    width:400px;
    height:400px;

    background:rgba(0,212,255,.12);

    border-radius:50%;

    filter:blur(90px);

    top:-150px;
    left:-120px;
}

body::after{
    content:'';

    position:absolute;

    width:400px;
    height:400px;

    background:rgba(124,58,237,.14);

    border-radius:50%;

    filter:blur(90px);

    bottom:-180px;
    right:-120px;
}

/* CARD */
.login-container{
    width:100%;
    max-width:430px;
    text-decoration-color: #0b1120;
    padding:42px;

    border-radius:32px;

    /* cor estática azul clara */
    background: #044a96;

    border:1px solid #000508;

    backdrop-filter:none;
    -webkit-backdrop-filter:none;

    box-shadow:
    0 10px 30px rgba(0,0,0,.25),
    inset 0 1px 1px rgba(255,255,255,.4);

    position:relative;
    z-index:10;
    animation:fadeUp .8s ease;

}

@keyframes fadeUp{

    from{
        opacity:0;
        transform:
        translateY(30px)
        scale(.96);
    }

    to{
        opacity:1;
        transform:
        translateY(0)
        scale(1);
    }

}

/* ROBOT */

.robot{
    width:140px;
    height:140px;

    margin:0 auto 30px;

    position:relative;
}

.head{
    width:140px;
    height:140px;

    border-radius:38px;

    background:
    linear-gradient(
    145deg,
    #1e293b,
    #0f172a
    );

    border:1px solid rgba(255,255,255,.08);

    position:relative;

    overflow:hidden;

    box-shadow:
    inset -10px -10px 20px rgba(0,0,0,.4),
    inset 10px 10px 20px rgba(255,255,255,.03);
}

.head::before{
    content:'';

    position:absolute;

    width:180px;
    height:50px;

    background:rgba(255,255,255,.05);

    transform:rotate(-30deg);

    top:-20px;
    left:-40px;
}

/* EYES */

.eyes{
    width:100%;

    display:flex;
    justify-content:center;
    gap:24px;

    position:absolute;
    top:50px;
}

.eye{
    width:34px;
    height:34px;

    background:#0b1120;

    border-radius:50%;

    position:relative;

    overflow:hidden;

    border:2px solid rgba(255,255,255,.08);

    transition:.15s;
}

.pupil{
    width:16px;
    height:16px;

    border-radius:50%;

    background:
    linear-gradient(
    135deg,
    #00d4ff,
    #38bdf8
    );

    position:absolute;

    top:7px;
    left:7px;

    transition:.08s linear;

    box-shadow:
    0 0 12px #00d4ff,
    0 0 25px rgba(0,212,255,.5);
}

/* MOUTH */

.mouth{
    width:52px;
    height:10px;

    background:
    linear-gradient(
    to right,
    #00d4ff,
    #7c3aed
    );

    border-radius:20px;

    position:absolute;

    bottom:35px;
    left:50%;

    transform:translateX(-50%);

    transition:.3s;
}

/* HANDS */

.hand{
    width:42px;
    height:42px;

    border-radius:14px;

    background:
    linear-gradient(
    145deg,
    #1e293b,
    #111827
    );

    position:absolute;

    top:55px;

    transition:.45s ease;

    z-index:20;
}

.hand.left{
    left:-18px;
}

.hand.right{
    right:-18px;
}

.robot.password-mode .hand.left{
    transform:
    translate(38px,-6px)
    rotate(-25deg);
}

.robot.password-mode .hand.right{
    transform:
    translate(-38px,-6px)
    rotate(25deg);
}

/* TITLES */

.title{
    text-align:center;

    color:var(--text);

    font-size:30px;
    font-weight:800;

    margin-bottom:10px;
}

.subtitle{
    text-align:center;

    color:var(--muted);

    margin-bottom:35px;

    font-size:14px;
}

/* DJANGO MESSAGES */

.alert{
    width:100%;

    padding:16px;

    border-radius:16px;

    margin-bottom:20px;

    font-size:14px;
    font-weight:600;
}

.alert.error{
    background:rgba(239,68,68,.12);
    border:1px solid rgba(239,68,68,.25);
    color:#fecaca;
}

.alert.success{
    background:rgba(34,197,94,.12);
    border:1px solid rgba(34,197,94,.25);
    color:#bbf7d0;
}

/* INPUTS */

.input-group{
    margin-bottom:22px;
}

.input-group label{
    display:block;

    color:#cbd5e1;

    margin-bottom:10px;

    font-size:14px;
    font-weight:600;
}

.input-wrapper{
    position:relative;
}

.input{
    width:100%;
    height:58px;

    border-radius:18px;

    border:1px solid rgba(255,255,255,.08);

    background:rgba(255,255,255,.04);

    padding:0 18px;

    color:white;

    font-size:15px;

    outline:none;

    transition:.25s;
}

.input::placeholder{
    color:#64748b;
}

.input:focus{
    border-color:#00d4ff;

    box-shadow:
    0 0 0 4px rgba(0,212,255,.12);
}

/* PASSWORD TOGGLE */

.toggle-password{
    position:absolute;

    right:18px;
    top:50%;

    transform:translateY(-50%);

    cursor:pointer;

    color:#94a3b8;

    user-select:none;

    font-size:18px;
}

/* BUTTON */

.login-btn{
    width:100%;
    height:58px;

    border:none;

    border-radius:18px;

    background:
    linear-gradient(
    135deg,
    #00d4ff,
    #2563eb,
    #7c3aed
    );

    background-size:200% 200%;

    animation:gradient 5s ease infinite;

    color:white;

    font-size:16px;
    font-weight:700;

    cursor:pointer;

    transition:.25s;

    margin-top:10px;

    box-shadow:
    0 10px 25px rgba(37,99,235,.35);
}

.login-btn:hover{
    transform:translateY(-2px);

    box-shadow:
    0 18px 30px rgba(37,99,235,.4);
}

.login-btn:disabled{
    opacity:.7;
    cursor:not-allowed;
}

@keyframes gradient{

    0%{
        background-position:0% 50%;
    }

    50%{
        background-position:100% 50%;
    }

    100%{
        background-position:0% 50%;
    }

}

/* FOOTER */

.footer{
    text-align:center;

    margin-top:28px;

    color:var(--muted);

    font-size:13px;
}

/* MOBILE */

@media(max-width:500px){

    .login-container{
        padding:30px;
        border-radius:26px;
    }

}


</style>
</head>

<body>

<main class="login-container">

    <!-- ROBOT -->

    <div class="robot" id="robot">

        <div class="hand left"></div>
        <div class="hand right"></div>

        <div class="head">

            <div class="eyes">

                <div class="eye">
                    <div class="pupil"></div>
                </div>

                <div class="eye">
                    <div class="pupil"></div>
                </div>

            </div>

            <div class="mouth"></div>

        </div>

    </div>

    <!-- TITLE -->

    <h1 class="title">Bem-vindo</h1>

    <p class="subtitle">
        Entre na sua conta segura
    </p>

    <!-- DJANGO MESSAGES -->

    {% if messages %}

        {% for message in messages %}

            <div class="alert {{ message.tags }}">
                {{ message }}
            </div>

        {% endfor %}

    {% endif %}

   
    <!-- FORM -->

    <form method="POST" id="loginForm">

        {% csrf_token %}

        <!-- USERNAME -->

        <div class="input-group">

            <label for="username">
                Usuário
            </label>

            <div class="input-wrapper">

                <input
                    type="text"
                    name="username"
                    id="username"
                    class="input"

                    placeholder="Digite seu usuário"

                    autocomplete="username"

                    aria-label="Usuário"

                    required
                >

            </div>

        </div>

        <!-- PASSWORD -->

        <div class="input-group">

            <label for="password">
                Senha
            </label>

            <div class="input-wrapper">

                <input
                    type="password"
                    name="password"
                    id="password"
                    class="input"

                    placeholder="Digite sua senha"

                    autocomplete="current-password"

                    aria-label="Senha"

                    required
                >

                <span class="toggle-password" id="togglePassword">
                    👁
                </span>

            </div>

        </div>

        <!-- BUTTON -->

        <button
            type="submit"
            class="login-btn"
            id="loginBtn"
        >
            Entrar
        </button>

    </form>

    <div class="footer">
                    © 2026 Sistema de Entregas.<br>
                    Caso de dúvida, entre em contato com o administrador.<br>
                    <strong>Ray Farias</strong>
    </div>

</main>

<script>

/* ELEMENTS */

const pupils =
document.querySelectorAll('.pupil');

const username =
document.getElementById('username');

const password =
document.getElementById('password');

const robot =
document.getElementById('robot');

const togglePassword =
document.getElementById('togglePassword');

const loginForm =
document.getElementById('loginForm');

const loginBtn =
document.getElementById('loginBtn');

/* CONTROL */

let typing = false;

/* USERNAME */

username.addEventListener('focus', ()=>{

    robot.classList.remove('password-mode');

});

username.addEventListener('input', (e)=>{

    typing = true;

    const length = e.target.value.length;

    let moveX =
    Math.min(length * 2, 12);

    pupils.forEach(pupil=>{

        pupil.style.transform =
        `translate(${moveX}px,2px)`;

    });

});

username.addEventListener('blur', ()=>{

    typing = false;

});

/* PASSWORD */

password.addEventListener('focus', ()=>{

    robot.classList.add('password-mode');

});

password.addEventListener('blur', ()=>{

    robot.classList.remove('password-mode');

});

/* MOUSE TRACKING */

document.addEventListener('mousemove',(e)=>{

    if(typing) return;

    const x =
    (e.clientX / window.innerWidth - .5) * 10;

    const y =
    (e.clientY / window.innerHeight - .5) * 10;

    pupils.forEach(pupil=>{

        pupil.style.transform =
        `translate(${x}px,${y}px)`;

    });

});

/* SHOW PASSWORD */

togglePassword.addEventListener('click', ()=>{

    password.type =
    password.type === 'password'
    ? 'text'
    : 'password';

});

/* SUBMIT LOADING */

loginForm.addEventListener('submit', ()=>{

    loginBtn.innerHTML =
    'Entrando...';

    loginBtn.disabled = true;

});

/* BLINK */

setInterval(()=>{

    document.querySelectorAll('.eye')
    .forEach(eye=>{

        eye.style.height = '5px';

        setTimeout(()=>{

            eye.style.height = '34px';

        },120);

    });

},4000);

</script>

</body>
</html>
