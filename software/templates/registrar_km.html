<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lançar KM</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

{% include "cabecalho.html" %}

{% block content %}
<body class="bg-light">

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card shadow border-0">
                <div class="card-body p-4">
                    <h4 class="card-title text-center mb-4">Registro Diário de KM</h4>
                    
                    {% if error_message %}
                        <div class="alert alert-danger alert-dismissible fade show" role="alert">
                            <i class="fas fa-exclamation-triangle me-2"></i>
                            {{ error_message }}
                            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                        </div>
                    {% endif %}

                    <form method="POST">
                        {% csrf_token %}
                        
                        <div class="mb-3">
                            <label class="form-label fw-bold">Selecionar Motoboy</label>
                            <select name="motoboy" class="form-select" required>
                                <option value="">-- Selecione o Profissional --</option>
                                {% for m in motoboys %}
                                    <option value="{{ m.id }}" {% if dados.motoboy == m.id|stringformat:"s" %}selected{% endif %}>
                                        {{ m.get_full_name|default:m.username }}
                                    </option>
                                {% endfor %}
                            </select>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-bold">Data da Apuração</label>
                            <input type="date" name="data_apuracao" class="form-control" 
                                   value="{{ dados.data_apuracao }}" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-bold">Quilometragem (KM)</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="fas fa-road"></i></span>
                                <input type="number" step="0.1" name="km_diario" class="form-control" 
                                       placeholder="0.00" value="{{ dados.km_diario }}" required>
                            </div>
                        </div>


                        <div class="mb-3">
                            <label class="form-label fw-bold">Gorjeta (R$)</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="fas fa-money-bill-wave"></i></span>
                                <input type="number" step="0.01" name="gorjeta" class="form-control" 
                                       placeholder="0.00" value="{{ dados.gorjeta }}" required>
                            </div>
                        </div>

                        <div class="d-grid gap-2 mt-4">
                            <button type="submit" class="btn btn-primary btn-lg">
                                <i class="fas fa-save me-2"></i>Registrar
                            </button>
                            <a href="{% url 'boardadministrativo' %}" class="btn btn-link text-decoration-none">Voltar</a>
                        </div>
                    </form>
                    
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
{% endblock %}
</html>
