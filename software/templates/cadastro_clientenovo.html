<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Cadastro de Cliente</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="container mt-5">
    <h2 class="mb-4">Novo Cadastro de Cliente</h2>

    <form method="POST" action="{% url 'salvar_customer' %}">
        {% csrf_token %} <div class="row">
            <div class="col-md-6 mb-3">
                <label>Nome:</label>
                <input type="text" name="name" class="form-control" required>
            </div>
            <div class="col-md-3 mb-3">
                <label>Código Único:</label>
                <input type="text" name="code" class="form-control" required>
            </div>
            <div class="col-md-3 mb-3">
                <label>Tipo:</label>
                <input type="text" name="type" class="form-control">
            </div>
        </div>

        <div class="row">
            <div class="col-md-6 mb-3">
                <label>E-mail:</label>
                <input type="email" name="email" class="form-control">
            </div>
            <div class="col-md-6 mb-3">
                <label>CEP:</label>
                <input type="text" name="cep" class="form-control">
            </div>
        </div>

        <div class="mb-3">
            <label>Endereço:</label>
            <textarea name="address" class="form-control" rows="2"></textarea>
        </div>

        <div class="row">
            <div class="col-md-3 mb-3">
                <label>Latitude:</label>
                <input type="number" step="any" name="latitude" class="form-control" value="0.0">
            </div>
            <div class="col-md-3 mb-3">
                <label>Longitude:</label>
                <input type="number" step="any" name="longitude" class="form-control" value="0.0">
            </div>
            <div class="col-md-3 mb-3">
                <label>Início Exp.:</label>
                <input type="time" name="hour_start" class="form-control">
            </div>
            <div class="col-md-3 mb-3">
                <label>Fim Exp.:</label>
                <input type="time" name="hour_end" class="form-control">
            </div>
        </div>

        <button type="submit" class="btn btn-primary btn-lg">Salvar Cliente</button>
    </form>
</body>
</html>
