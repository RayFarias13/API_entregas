<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            width: 100%;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(45deg, #34ffc2, #0114be, #9bddf7);
            background-size: 400% 400%;
            animation: gradient 15s ease infinite;
        }

        @keyframes gradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .container-login {
            width: 400px;
            background: #fff;
            border-radius: 10px;
            overflow: hidden;
            padding: 55px 55px 37px 55px;
            box-shadow: 0 5px 10px 0px rgba(0, 0, 0, 0.1);
        }

        .login-title {
            display: block;
            font-size: 30px;
            color: #333;
            line-height: 1.2;
            text-align: center;
            font-weight: 700;
            padding-bottom: 26px;
        }

        .wrap-input {
            width: 100%;
            position: relative;
            border-bottom: 2px solid #adadad;
            margin-bottom: 37px;
        }

        .input-form {
            font-size: 15px;
            color: #555;
            line-height: 1.2;
            display: block;
            width: 100%;
            height: 45px;
            background: transparent;
            border: none;
            outline: none;
            padding: 0 5px;
        }

        .focus-input {
            position: absolute;
            display: block;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            pointer-events: none;
        }

        .focus-input::before {
            content: "";
            display: block;
            position: absolute;
            bottom: -2px;
            left: 0;
            width: 0;
            height: 2px;
            transition: all 0.4s;
            background: linear-gradient(to right, #4158d0, #c850c0);
        }

        .input-form:focus + .focus-input::before {
            width: 100%;
        }

        .container-login-btn {
            width: 100%;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            padding-top: 13px;
        }

        .login-btn {
            font-size: 16px;
            color: #fff;
            line-height: 1.2;
            text-transform: uppercase;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 0 20px;
            width: 100%;
            height: 50px;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.4s;
            background: linear-gradient(to right, #4158d0, #c850c0);
        }

        .login-btn:hover {
            filter: brightness(1.1);
            transform: scale(1.02);
        }

        .text-center {
            text-align: center;
            padding-top: 30px;
        }

        .txt1 {
            font-size: 12px;
            color: #666;
            line-height: 1.5;
        }

        /* Ajuste para erros do Django */
        .alert-login {
            font-size: 14px;
            padding: 10px;
            margin-bottom: 20px;
            border-radius: 5px;
            text-align: center;
        }

        @media (max-width: 576px) {
            .container-login {
                width: 90%;
                padding: 40px 15px;
            }
        }
    </style>
</head>
<body>

    <div class="container-login">
        <form class="login-form" method="POST">
            {% csrf_token %}

            <span class="login-title">Bem-vindo</span>

            {% if form.errors %}
                <div class="alert alert-danger alert-login">
                    Usuário ou senha incorretos.
                </div>
            {% endif %}

            <div class="wrap-input">
                <input class="input-form" type="text" name="username" placeholder="Usuário" required>
                <span class="focus-input"></span>
            </div>

            <div class="wrap-input">
                <input class="input-form" type="password" name="password" placeholder="Senha" required>
                <span class="focus-input"></span>
            </div>

            <div class="container-login-btn">
                <button type="submit" class="login-btn">
                    Login
                </button>
            </div>

            <div class="text-center">
                <span class="txt1">
                    © 2026 Sistema de Entregas.<br>
                    Caso de dúvida, entre em contato com o administrador.<br>
                    <strong>Ray Farias</strong>
                </span>
            </div>
        </form>
    </div>

</body>
</html>
